[metadata]
description-file = README.rst

[aliases]
# Define `python setup.py test`
test=pytest

[coverage:run]
branch = True
source = mccssubarrayleafnode
data_file = mccssubarrayleafnode_coverage
debug = dataio,dataop

[tool:pytest]
testpaths = test

addopts =
          --forked
          --json-report
          --json-report-file=../reports/mccssubarrayleafnode-report.json
          --cov-branch
          --cov-report term
          --cov-report html:../reports/mccssubarrayleafnode_htmlcov
          --cov-report xml:../reports/mccssubarrayleafnode-code-coverage.xml
          --cov=mccssubarrayleafnode
          --junitxml=../reports/mccssubarrayleafnode-unit-tests.xml
          --verbose
          --dist loadscope --numprocesses auto

console_output_style = progress
junit_family = legacy

filterwarnings =
    ignore::DeprecationWarning
